# Nginx configuration for Generative AI Chatbot
# Place this file in /etc/nginx/sites-available/chatbot
# Then create symlink: sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;  # Change to your domain name or IP
    
    # Logging
    access_log /var/log/nginx/chatbot-access.log;
    error_log /var/log/nginx/chatbot-error.log;

    # Client body size limit (for file uploads)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static files
    location /static/ {
        alias /opt/chatbot/generative-ai-chatbot/web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API and main application - proxy to Flask
    location / {
        # Rate limiting
        limit_req zone=chatbot_limit burst=20 nodelay;

        # Proxy settings
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }
}

